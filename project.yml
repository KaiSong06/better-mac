name: better-mac
options:
  bundleIdPrefix: com.KaiSong06
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "9"
    PRODUCT_BUNDLE_IDENTIFIER: com.KaiSong06.NotchFree
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    CLANG_ENABLE_MODULES: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_PREVIEWS: YES
  configs:
    Debug:
      # Sign Debug builds with the Apple Development cert so the binary's
      # designated requirement is stable across rebuilds. Without this, TCC
      # invalidates the Accessibility grant every build (the cdhash changes)
      # and the Volume HUD silently fails to install its CGEventTap.
      #
      # The SHA hash below is the cert's fingerprint (from
      # `security find-identity -v`). Using the hash dodges Xcode's team-ID
      # matching, which gets confused by certs whose OU and CN team IDs
      # differ.
      CODE_SIGN_IDENTITY: "BD481265772546378FDE284EDFF523FCE524D765"
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: "K4DKFK28TA"
      PROVISIONING_PROFILE_SPECIFIER: ""
      ENABLE_HARDENED_RUNTIME: NO
    Release:
      # The release.sh script overrides these via xcodebuild command-line flags
      # when a real Developer ID is configured via environment variables.
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_STYLE: Manual
      ENABLE_HARDENED_RUNTIME: YES
      OTHER_CODE_SIGN_FLAGS: "--timestamp"
targets:
  better-mac:
    type: application
    platform: macOS
    sources:
      - path: better-mac
        excludes:
          - "Resources/Info.plist"
          - "better-mac.entitlements"
    resources:
      - better-mac/Resources/Assets.xcassets
    dependencies:
      - package: Sparkle
    info:
      path: better-mac/Resources/Info.plist
      properties:
        LSUIElement: YES
        LSMinimumSystemVersion: "14.0"
        NSSupportsAutomaticTermination: NO
        NSSupportsSuddenTermination: NO
        NSHumanReadableCopyright: "© 2026 KaiSong06"
        CFBundleName: NotchFree
        CFBundleDisplayName: NotchFree
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        CFBundleInfoDictionaryVersion: "6.0"
        NSAppleEventsUsageDescription: >-
          NotchFree uses Apple Events to read the current track info from Spotify
          as a fallback when system Now Playing is unavailable.
        LSApplicationCategoryType: public.app-category.utilities
        # Sparkle: update feed + public EdDSA verification key.
        # These values are overridden by scripts/release.sh when SPARKLE_PUBLIC_ED_KEY
        # / APPCAST_URL environment variables are set at build time.
        SUFeedURL: https://KaiSong06.github.io/NotchFree/appcast.xml
        # Public EdDSA key; the matching private key lives in the macOS
        # Keychain and is used by scripts/release.sh → sign_update. Safe to
        # commit — public only.
        SUPublicEDKey: "vVnUWAkJByng74JEK9CJI+CeAoMfG3eOET4fkxucXHU="
        SUEnableAutomaticChecks: YES
        SUScheduledCheckInterval: 3600
    entitlements:
      path: better-mac/better-mac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
    settings:
      base:
        INFOPLIST_FILE: better-mac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: better-mac/better-mac.entitlements
        # User-facing brand. The Xcode target stays "better-mac" internally;
        # PRODUCT_NAME is what controls the .app bundle name and the
        # executable inside it.
        PRODUCT_NAME: NotchFree
        # Keep the Swift module name stable so tests can `@testable import
        # better_mac` without a mass rename. Only the user-visible bundle /
        # executable picks up the new brand.
        PRODUCT_MODULE_NAME: better_mac
  better-macTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - better-macTests
    dependencies:
      - target: better-mac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/NotchFree.app/Contents/MacOS/NotchFree"
schemes:
  better-mac:
    build:
      targets:
        better-mac: all
        better-macTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - better-macTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
